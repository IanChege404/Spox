name: Flutter CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.0'
        channel: 'stable'
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Format check
      run: dart format --set-exit-if-changed lib test integration_test
    
    - name: Analyze
      run: flutter analyze lib
    
    - name: Run tests
      run: flutter test --coverage
    
    - name: Verify test results
      run: |
        echo "Test suite completed successfully"
        echo "Coverage report generated at coverage/lcov.info"
        python3 << 'EOF'
        import re
        
        with open('coverage/lcov.info', 'r') as f:
          content = f.read()
        
        lh_lines = re.findall(r'LH:(\d+)', content)
        lf_lines = re.findall(r'LF:(\d+)', content)
        
        total_lh = sum(int(x) for x in lh_lines)
        total_lf = sum(int(x) for x in lf_lines)
        coverage_pct = (total_lh / total_lf * 100) if total_lf > 0 else 0
        
        print(f"✅ Coverage: {coverage_pct:.2f}%")
        print(f"   Lines covered: {total_lh}/{total_lf}")
        
        # Check critical layers
        files = {}
        current_file = None
        for line in content.split('\n'):
          if line.startswith('SF:'):
            current_file = line[3:]
            files[current_file] = {'lh': 0, 'lf': 0}
          elif line.startswith('LH:') and current_file:
            files[current_file]['lh'] = int(line[3:])
          elif line.startswith('LF:') and current_file:
            files[current_file]['lf'] = int(line[3:])
        
        dirs = {}
        for file, data in files.items():
          if data['lf'] > 0:
            pct = data['lh'] / data['lf'] * 100
            parts = file.split('/')
            dirkey = '/'.join(parts[:-1]) if len(parts) > 1 else 'root'
            if dirkey not in dirs:
              dirs[dirkey] = {'lh': 0, 'lf': 0}
            dirs[dirkey]['lh'] += data['lh']
            dirs[dirkey]['lf'] += data['lf']
        
        # Aggregate by layer
        layers = {}
        for dirkey, data in dirs.items():
          if 'lib/bloc/' in dirkey:
            layer = 'lib/bloc'
          elif 'lib/services' in dirkey:
            layer = 'lib/services'
          elif 'lib/data/repository' in dirkey:
            layer = 'lib/data/repository'
          else:
            continue
          
          if layer not in layers:
            layers[layer] = {'lh': 0, 'lf': 0}
          layers[layer]['lh'] += data['lh']
          layers[layer]['lf'] += data['lf']
        
        print("\n📊 Layer Coverage Status:")
        layer_targets = [
          ('lib/bloc', 65),
          ('lib/services', 20),
          ('lib/data/repository', 25),
        ]
        
        all_thresholds_met = True
        for layer, target in layer_targets:
          if layer in layers:
            data = layers[layer]
            pct = data['lh'] / data['lf'] * 100 if data['lf'] > 0 else 0
            status = '✅' if pct >= target else '⚠️'
            print(f"   {status} {layer}: {pct:.1f}% (threshold: {target}%)")
            if pct < target:
              all_thresholds_met = False
        
        if all_thresholds_met:
          print("\n✅ All coverage thresholds met!")
        else:
          print("\n⚠️  Phase 5.2 roadmap: Expand service/repo test coverage")
        EOF
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./coverage/lcov.info
        flags: unittests
        verbose: false
        fail_ci_if_error: false

  build-apk:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.0'
        channel: 'stable'
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-release.apk
        path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.0'
        channel: 'stable'
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build iOS
      run: flutter build ios --release --no-codesign
    
    - name: Upload iOS build
      uses: actions/upload-artifact@v3
      with:
        name: ios-release
        path: build/ios/iphoneos/
