name: spotify_clone
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Animation
  auto_size_text: ^3.0.0
  animations: ^2.0.11
  mobile_scanner: ^5.1.0
  video_player: ^2.8.2
  shimmer: ^3.0.0
  flutter_animate: ^4.2.0
  lottie: ^3.1.0
  palette_generator: ^0.3.3
  
  # State Management & DI
  bloc: ^8.1.3
  flutter_bloc: ^8.1.4
  get_it: ^7.6.7
  provider: ^6.1.0
  equatable: ^2.0.5

  # Audio
  just_audio: ^0.9.35
  audio_service: ^0.18.16

  # Network & API
  dio: ^5.3.0
  crypto: ^3.0.3
  url_launcher: ^6.2.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Configuration Management
  flutter_dotenv: ^5.1.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  google_sign_in: ^6.1.6
  firebase_analytics: ^10.7.0

  # Charts for Stats Page
  fl_chart: ^0.65.0

  # Caching
  cached_network_image: ^3.3.0

  # Screenshot for Sharing
  screenshot: ^2.1.0

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  bloc_test: ^9.1.0
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21 
  web:
    generate: true
    image_path: "path/to/image.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "path/to/image.png"
    icon_size: 48 
  macos:
    generate: true
    image_path: "path/to/image.png"

  flutter_lints: ^3.0.1


flutter:


  uses-material-design: true


  assets:
    - .env
    - images/
    - images/artists/
    - images/podcasts/
    - images/home/
    - images/chill/
    - images/drake mix/
    - images/upbeat/
    - images/2010/
    - video/

  fonts:
    - family: AM
      fonts:
        - asset: fonts/Avenir Medium.ttf

    - family: AB
      fonts:
        - asset: fonts/Avenir Next LT Pro Bold.otf
